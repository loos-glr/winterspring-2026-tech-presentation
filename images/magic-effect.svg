<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="100%" height="100%">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D745" stop-opacity="1" />
      <stop offset="100%" stop-color="#00D745" stop-opacity="0" />
    </radialGradient>
    
    <path id="sparkle" d="M0,-12 Q0,0 12,0 Q0,0 0,12 Q0,0 -12,0 Q0,0 0,-12 Z" fill="#00D745"/>
  </defs>

  <circle cx="125" cy="125" r="20" fill="url(#glow)">
    <animate attributeName="r" values="20; 70; 20" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8; 0; 0.8" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="125" cy="125" r="5" fill="#FFFFFF">
    <animate attributeName="r" values="5; 9; 5" dur="1s" repeatCount="indefinite" />
  </circle>

  <circle cx="125" cy="125" r="10" fill="none" stroke="#00D745" stroke-width="2">
    <animate attributeName="r" values="10; 90" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1; 0" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="125" cy="125" r="10" fill="none" stroke="#FFFFFF" stroke-width="1">
    <animate attributeName="r" values="10; 80" dur="2.5s" begin="1s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8; 0" dur="2.5s" begin="1s" repeatCount="indefinite" />
  </circle>

  <g transform="translate(125, 125)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite" />
      
      <g transform="translate(0, -55)">
        <g>
          <animateTransform attributeName="transform" type="scale" values="0.5; 1; 0.5" dur="1.5s" repeatCount="indefinite" />
          <use href="#sparkle" />
        </g>
      </g>
      
      <g transform="translate(55, 0)">
        <g>
          <animateTransform attributeName="transform" type="scale" values="1; 0.4; 1" dur="2s" repeatCount="indefinite" />
          <use href="#sparkle" />
        </g>
      </g>
      
      <g transform="translate(0, 55)">
        <g>
          <animateTransform attributeName="transform" type="scale" values="0.6; 1.2; 0.6" dur="1.8s" repeatCount="indefinite" />
          <use href="#sparkle" />
        </g>
      </g>
      
      <g transform="translate(-55, 0)">
        <g>
          <animateTransform attributeName="transform" type="scale" values="1.2; 0.5; 1.2" dur="1.2s" repeatCount="indefinite" />
          <use href="#sparkle" />
        </g>
      </g>
    </g>
  </g>
</svg>
